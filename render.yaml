# Render Blueprint — single Docker service (API + frontend on one URL)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: marhas
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: API_PREFIX
        value: /api/v1
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: marhas
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
